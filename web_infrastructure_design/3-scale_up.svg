<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900">
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 10; }
    .server { fill: #eef6ff; stroke: #1d4ed8; stroke-width: 3; rx: 14; }
    .lb { fill: #ecfdf5; stroke: #047857; stroke-width: 3; rx: 14; }
    .db { fill: #fff7ed; stroke: #c2410c; stroke-width: 3; rx: 14; }
    .cluster { fill: none; stroke: #047857; stroke-width: 3; stroke-dasharray: 10 7; rx: 18; }
    .title { font: 700 28px Arial, sans-serif; fill: #111827; }
    .label { font: 700 20px Arial, sans-serif; fill: #111827; }
    .small { font: 16px Arial, sans-serif; fill: #374151; }
    .note { font: 15px Arial, sans-serif; fill: #334155; }
    .why { font: 15px Arial, sans-serif; fill: #14532d; }
    .arrow { stroke: #111827; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    .green { stroke: #047857; stroke-width: 3; fill: none; marker-end: url(#arrowhead-green); }
    .orange { stroke: #c2410c; stroke-width: 3; fill: none; marker-end: url(#arrowhead-orange); }
    .dash { stroke: #6b7280; stroke-width: 2; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrowhead-gray); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#111827"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#047857"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c2410c"/>
    </marker>
    <marker id="arrowhead-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <rect class="bg" width="1500" height="900"/>
  <text class="title" x="55" y="55">3. Scale up: separated web, application, and database layers</text>

  <rect class="box" x="60" y="125" width="165" height="90"/>
  <text class="label" x="108" y="162">User</text>
  <text class="small" x="83" y="190">Browser client</text>

  <rect class="box" x="285" y="110" width="225" height="120"/>
  <text class="label" x="350" y="150">DNS</text>
  <text class="small" x="315" y="182">www.foobar.com</text>
  <text class="small" x="315" y="208">points to LB cluster VIP</text>

  <rect class="cluster" x="590" y="90" width="445" height="205"/>
  <text class="label" x="715" y="125">HAProxy cluster</text>
  <text class="note" x="666" y="151">Two load balancers share a virtual IP</text>

  <rect class="lb" x="625" y="175" width="160" height="80"/>
  <text class="label" x="666" y="208">LB 1</text>
  <text class="small" x="654" y="232">HAProxy</text>

  <rect class="lb" x="840" y="175" width="160" height="80"/>
  <text class="label" x="881" y="208">LB 2</text>
  <text class="small" x="869" y="232">HAProxy</text>

  <path class="dash" d="M 785 215 L 840 215"/>
  <text class="note" x="780" y="278">Cluster removes the load balancer as a single point of failure</text>

  <rect class="server" x="165" y="415" width="285" height="260"/>
  <text class="label" x="245" y="455">Web server</text>
  <text class="small" x="222" y="490">Nginx only</text>
  <text class="small" x="198" y="520">Receives HTTP requests</text>
  <text class="small" x="198" y="548">Serves static content</text>
  <text class="small" x="198" y="576">Proxies dynamic requests</text>
  <text class="why" x="198" y="625">Separated so web traffic can</text>
  <text class="why" x="198" y="648">scale independently.</text>

  <rect class="server" x="610" y="415" width="285" height="260"/>
  <text class="label" x="680" y="455">App server</text>
  <text class="small" x="665" y="490">Application runtime</text>
  <text class="small" x="650" y="520">Codebase lives here</text>
  <text class="small" x="650" y="548">Runs business logic</text>
  <text class="small" x="650" y="576">Talks to the database</text>
  <text class="why" x="650" y="625">Separated so application work</text>
  <text class="why" x="650" y="648">does not compete with Nginx.</text>

  <rect class="db" x="1055" y="415" width="285" height="260"/>
  <text class="label" x="1128" y="455">Database</text>
  <text class="small" x="1115" y="490">MySQL server</text>
  <text class="small" x="1092" y="520">Stores persistent data</text>
  <text class="small" x="1092" y="548">Handles reads and writes</text>
  <text class="small" x="1092" y="576">Can later be replicated</text>
  <text class="why" x="1092" y="625">Separated to reduce resource</text>
  <text class="why" x="1092" y="648">contention and isolate data.</text>

  <path class="dash" d="M 225 150 C 250 125, 265 125, 285 145"/>
  <text class="note" x="238" y="108">DNS lookup</text>

  <path class="arrow" d="M 510 170 L 590 170"/>
  <text class="note" x="522" y="150">VIP address</text>

  <path class="arrow" d="M 225 195 C 385 305, 515 210, 625 215"/>
  <text class="note" x="330" y="315">Client request reaches active HAProxy</text>

  <path class="green" d="M 705 255 C 600 325, 455 375, 310 415"/>
  <path class="green" d="M 920 255 C 780 320, 520 370, 310 415"/>
  <text class="note" x="420" y="365">Load balancers forward traffic to the web layer</text>

  <path class="arrow" d="M 450 545 L 610 545"/>
  <text class="note" x="486" y="525">Dynamic requests</text>

  <path class="orange" d="M 895 545 L 1055 545"/>
  <text class="note" x="952" y="525">SQL queries</text>

  <rect class="box" x="80" y="745" width="410" height="95"/>
  <text class="label" x="110" y="780">Added server</text>
  <text class="small" x="110" y="810">Provides enough machines to split the stack into</text>
  <text class="small" x="110" y="833">dedicated web, application, and database roles.</text>

  <rect class="box" x="545" y="745" width="410" height="95"/>
  <text class="label" x="575" y="780">Added load balancer</text>
  <text class="small" x="575" y="810">Pairs with the existing HAProxy in a cluster so</text>
  <text class="small" x="575" y="833">traffic can keep flowing if one load balancer fails.</text>

  <rect class="box" x="1010" y="745" width="410" height="95"/>
  <text class="label" x="1040" y="780">Split components</text>
  <text class="small" x="1040" y="810">Each layer can be maintained, scaled, and debugged</text>
  <text class="small" x="1040" y="833">without every role sharing the same resources.</text>
</svg>
